name: Semgrep Scan

on:
  pull_request: {}
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Run Semgrep Scan
        id: semgrep_scan
        run: |
          pip install semgrep
          semgrep scan --config auto > semgrep_results.txt || true
          cat semgrep_results.txt

      - name: Send Notification to Slack
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          TARGETS=$(grep -E "Targets scanned:" semgrep_results.txt | awk '{print $NF}' || echo "0")
          FINDINGS=$(grep -E "Findings:" semgrep_results.txt | head -n 1 | awk '{print $3}' || echo "0")
          SUPPLY_CHAIN=$(grep -E "Supply chain findings|SCA" semgrep_results.txt | awk '{print $NF}' || echo "0")
          SECRETS="0 (Free Tier)"

          if [ "$JOB_STATUS" = "success" ]; then
            COLOR="good"
          else
            COLOR="danger"
          fi

          payload=\$(cat <<EOF
          {
            "text": "*Semgrep Security Scan Results*",
            "attachments": [
              {
                "color": "${COLOR}",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "• *Files Scanned:* ${TARGETS}\n• *Code Issues Found:* ${FINDINGS}\n• *Supply Chain Issues:* ${SUPPLY_CHAIN}\n• *Secrets Issues:* ${SECRETS}"
                    }
                  }
                ]
              }
            ]
          }
          EOF
          )

          curl -X POST -H 'Content-type: application/json' --data "\$payload" "$SLACK_WEBHOOK"
